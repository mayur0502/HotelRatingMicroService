server:
  port: 8084

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: USERSERVICE
              uri: lb://USERSERVICE
              predicates:
                - Path=/users/**

            - id: RATINGSERVICE
              uri: lb://RATINGSERVICE
              predicates:
                - Path=/ratings/**

            - id: HOTELSERVICE
              uri: lb://HOTELSERVICE
              predicates:
                - Path=/hotels/**

  config:
    import: optional:configserver:http://localhost:8087

